repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace   # remove trailing whitespaces
      - id: end-of-file-fixer     # empty line at EOL
      - id: check-yaml
      - id: check-added-large-files # block large files

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.0.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [
          --strict, feat, fix, perf, refactor, test, build, ci, chore, docs, revert,
          --scopes, alu,lsu,fpu,mul,div,core
        ]
